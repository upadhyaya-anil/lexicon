<title>Lexikon</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #ffffff;
    --surface:  #f5f5f5;
    --border:   #e0e0e0;
    --text:     #111111;
    --muted:    #666666;
    --accent:   #1a56db;
    --accent-bg:#eef2ff;
    --tag-bg:   #eef2ff;
    --tag-text: #1a40a8;
    --radius:   10px;
    --ff:       -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #111111;
      --surface:  #1e1e1e;
      --border:   #2e2e2e;
      --text:     #f0f0f0;
      --muted:    #999999;
      --accent:   #6b9eff;
      --accent-bg:#1a2340;
      --tag-bg:   #1a2340;
      --tag-text: #7baeff;
    }
  }
  html, body { height: 100%; }
  body {
    font-family: var(--ff);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* Splash */
  #splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; z-index: 200;
    transition: opacity 0.3s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash h2 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  #splash p  { font-size: 14px; color: var(--muted); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Ready badge */
  #status-badge {
    position: fixed; top: 14px; right: 52px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
    padding: 4px 10px; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 50;
    background: #d1fae5; color: #065f46;
  }
  #status-badge.show { opacity: 1; }
  @media (prefers-color-scheme: dark) {
    #status-badge { background: #064e3b; color: #6ee7b7; }
  }

  /* Header */
  header {
    padding: 14px 16px 10px; background: var(--bg);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .menu-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-btn:hover { background: var(--surface); color: var(--text); }

  /* Settings dropdown */
  #settings-menu {
    position: absolute; top: 52px; right: 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    z-index: 100; min-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    display: none;
  }
  #settings-menu.open { display: block; }
  .settings-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }
  .source-option {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .source-option:last-child { border-bottom: none; }
  .source-option input[type="radio"] { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; }
  .source-info {}
  .source-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .experimental-tag {
    font-size: 9px; font-weight: 700; letter-spacing: 0.4px;
    text-transform: uppercase; color: #b45309; background: #fef3c7;
    padding: 2px 6px; border-radius: 10px; margin-left: 6px;
  }
  @media (prefers-color-scheme: dark) {
    .experimental-tag { color: #fbbf24; background: #451a03; }
  }
  .source-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* Search */
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none;
  }
  #search {
    width: 100%; padding: 9px 12px 9px 36px; font-size: 16px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    outline: none; -webkit-appearance: none;
  }
  #search:focus { border-color: var(--accent); background: var(--bg); }
  #count { margin-top: 8px; font-size: 12px; color: var(--muted); min-height: 16px; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; position: relative; }
  #list {
    width: 140px; flex-shrink: 0; overflow-y: auto;
    border-right: 1px solid var(--border); -webkit-overflow-scrolling: touch;
  }
  .word-item {
    padding: 9px 12px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .word-item:active { background: var(--surface); }
  .word-item.selected { background: var(--accent-bg); color: var(--accent); font-weight: 600; }

  .hint {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 10px;
    color: var(--muted); font-size: 14px; text-align: center; padding: 24px;
  }
  .hint svg { opacity: 0.25; }

  #detail {
    flex: 1; overflow-y: auto; padding: 20px 16px 32px;
    -webkit-overflow-scrolling: touch;
  }
  .word-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .source-tag {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    display: block;
  }
  .sense { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .sense:last-child { border-bottom: none; margin-bottom: 0; }
  .pos-tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 2px 8px; border-radius: 20px;
    background: var(--tag-bg); color: var(--tag-text); margin-bottom: 8px;
  }
  .definition { font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
  .definition a {
    color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent);
  }
  .definition a:hover { border-bottom-style: solid; }
  .example {
    font-size: 14px; line-height: 1.6; color: var(--muted);
    font-style: italic; padding-left: 12px; border-left: 3px solid var(--border);
  }

  /* Debug panel */
  #debug-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(0,0,0,0.88); color: #00ff88;
    font-family: "Menlo", "Courier New", monospace; font-size: 11px;
    padding: 10px 14px 14px; line-height: 1.8;
    backdrop-filter: blur(6px);
    transform: translateY(0); transition: transform 0.3s ease;
  }
  #debug-panel.hidden { transform: translateY(100%); }
  #debug-title {
    font-size: 10px; font-weight: bold; letter-spacing: 1px;
    color: #aaa; margin-bottom: 4px; display: flex;
    justify-content: space-between; align-items: center;
  }
  #debug-close {
    background: #333; border: none; color: #aaa; font-size: 10px;
    padding: 2px 8px; border-radius: 4px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.5px;
  }
  .debug-row { display: flex; justify-content: space-between; gap: 16px; }
  .debug-label { color: #888; }
  .debug-val { color: #00ff88; font-weight: bold; }
  .debug-val.warn { color: #ffaa00; }
  .debug-val.bad  { color: #ff4444; }

  /* Mobile */
  @media (max-width: 480px) {
    body { flex-direction: column-reverse; }
    header {
      order: 2; border-bottom: none; border-top: 1px solid var(--border);
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    }
    .header-top { margin-bottom: 8px; }
    .layout { order: 1; }
    #count { display: none; } /* shown inline above list instead */
    #list-count {
      display: block; font-size: 12px; color: var(--muted);
      padding: 8px 16px 4px;
    }
    #list { width: 100%; border-right: none; }
    #detail {
      display: none; position: fixed; inset: 0; z-index: 10;
      background: var(--bg); padding: 16px 16px 100px;
      overflow-y: auto;
    }
    #detail.visible { display: block; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 15px; color: var(--accent); margin-bottom: 16px;
      cursor: pointer; background: none; border: none; padding: 0;
      font-family: var(--ff);
    }
    /* Swipe-back edge hint */
    #swipe-edge {
      position: fixed; top: 0; left: 0; width: 24px; height: 100%;
      z-index: 11; touch-action: pan-y;
    }
  }
  @media (min-width: 481px) {
    .back-btn { display: none; }
    #list-count { display: none; }
    #swipe-edge { display: none; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="spinner"></div>
  <h2>Lexikon</h2>
  <p id="splash-msg">Loading word list…</p>
</div>

<div id="status-badge"></div>

<div id="settings-menu" role="dialog" aria-label="Settings">
  <div class="settings-label">Dictionary Source</div>
  <label class="source-option">
    <input type="radio" name="source" value="wordset" checked>
    <div class="source-info">
      <div class="source-name">Wordset</div>
      <div class="source-desc">170k words · conversational tone · includes example sentences</div>
    </div>
  </label>
  <label class="source-option">
    <input type="radio" name="source" value="wordnet">
    <div class="source-info">
      <div class="source-name">WordNet <span class="experimental-tag">Experimental</span></div>
      <div class="source-desc">Princeton University · precise definitions · may not find every word</div>
    </div>
  </label>
</div>

<header>
  <div class="header-top">
    <h1>Lexikon</h1>
    <button class="menu-btn" id="menu-btn" aria-label="Settings" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="5"  r="1.5"/>
        <circle cx="12" cy="12" r="1.5"/>
        <circle cx="12" cy="19" r="1.5"/>
      </svg>
    </button>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Type a word…" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Search">
  </div>
  <div id="count" aria-live="polite"></div>
</header>

<div class="layout">
  <div id="list-count"></div>
  <div id="list" role="listbox" aria-label="Word suggestions">
    <div class="hint">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <span>Start typing to search</span>
    </div>
  </div>
  <div id="swipe-edge"></div>
  <div id="detail" role="region" aria-label="Definition">
    <div class="hint">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Select a word to see its definition</span>
    </div>
  </div>
</div>

<div id="debug-panel">
  <div id="debug-title">
    <span>🔧 DEBUG</span>
    <button id="debug-close" onclick="closeDebug()">Hide</button>
  </div>
  <div class="debug-row"><span class="debug-label">Source</span>        <span class="debug-val" id="dbg-source">—</span></div>
  <div class="debug-row"><span class="debug-label">Word list fetch</span><span class="debug-val" id="dbg-fetch">—</span></div>
  <div class="debug-row"><span class="debug-label">Words loaded</span>   <span class="debug-val" id="dbg-words">—</span></div>
  <div class="debug-row"><span class="debug-label">Total load</span>     <span class="debug-val" id="dbg-total">—</span></div>
  <div class="debug-row"><span class="debug-label">Last def fetch</span> <span class="debug-val" id="dbg-def">—</span></div>
  <div class="debug-row"><span class="debug-label">Script parse</span>   <span class="debug-val" id="dbg-parse">—</span></div>
</div>

<script>
// ── Data sources ──────────────────────────────────────────────────────────
const SOURCES = {
  wordset: {
    label: "Wordset",
    base: "https://raw.githubusercontent.com/wordset/wordset-dictionary/master/data",
    letters: "abcdefghijklmnopqrstuvwxyz#".split(""),
    getWords(chunk)  { return Object.keys(chunk); },
    getLetter(word)  {
      const c = word[0].toLowerCase();
      return /[a-z]/.test(c) ? c : "#";
    },
    getSenses(entry) {
      return (entry.meanings || []).filter(m => m.def).map(m => ({
        p: m.speech_part || "", d: m.def, e: m.example || ""
      }));
    }
  },
  wordnet: {
    label: "WordNet",
    // Open English WordNet — JSON release on GitHub
    base: "https://raw.githubusercontent.com/globalwordnet/english-wordnet/main/json",
    letters: "abcdefghijklmnopqrstuvwxyz".split(""),
    getWords(chunk)  { return Object.keys(chunk); },
    getLetter(word)  {
      const c = word[0].toLowerCase();
      return /[a-z]/.test(c) ? c : "a";
    },
    getSenses(entry) {
      // WordNet JSON structure: array of sense objects with "definition"
      const senses = [];
      (entry.senses || entry.definitions || [entry]).forEach(s => {
        const def = s.definition || s.gloss || "";
        if (def) senses.push({ p: s.partOfSpeech || s.pos || "", d: def, e: s.example || "" });
      });
      return senses;
    }
  }
};

// ── State ─────────────────────────────────────────────────────────────────
const T0 = performance.now();
let currentSource = "wordset";
let WORDS = [];
let filtered = [];
let selectedIndex = -1;
const cache = { wordset: {}, wordnet: {} }; // letter → parsed chunk

// ── Elements ──────────────────────────────────────────────────────────────
const searchEl  = document.getElementById("search");
const listEl    = document.getElementById("list");
const detailEl  = document.getElementById("detail");
const countEl   = document.getElementById("count");
const listCountEl = document.getElementById("list-count");
function setCount(text) {
  setCount(text);
  if (listCountEl) listCountEl.textContent = text;
}
const splash    = document.getElementById("splash");
const splashMsg = document.getElementById("splash-msg");
const badge     = document.getElementById("status-badge");
const menuBtn   = document.getElementById("menu-btn");
const settingsMenu = document.getElementById("settings-menu");

const MAX = 50;

// ── Debug ─────────────────────────────────────────────────────────────────
function dbg(id, val, level) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.className = "debug-val" + (level ? " " + level : "");
}
function msColor(ms) { return ms < 500 ? "" : ms < 2000 ? "warn" : "bad"; }
function closeDebug() { document.getElementById("debug-panel").classList.add("hidden"); }
dbg("dbg-parse", Math.round(performance.now()) + " ms");

// ── Badge ─────────────────────────────────────────────────────────────────
function showBadge(text) {
  badge.textContent = text;
  badge.classList.add("show");
}

// ── Splash ────────────────────────────────────────────────────────────────
function dismissSplash() {
  splash.classList.add("hidden");
  setTimeout(() => splash.remove(), 300);
}

// ── Settings menu ─────────────────────────────────────────────────────────
menuBtn.addEventListener("click", e => {
  e.stopPropagation();
  const open = settingsMenu.classList.toggle("open");
  menuBtn.setAttribute("aria-expanded", open);
});
document.addEventListener("click", e => {
  if (!settingsMenu.contains(e.target) && e.target !== menuBtn) {
    settingsMenu.classList.remove("open");
    menuBtn.setAttribute("aria-expanded", false);
  }
});
document.querySelectorAll('input[name="source"]').forEach(radio => {
  radio.addEventListener("change", async () => {
    currentSource = radio.value;
    settingsMenu.classList.remove("open");
    menuBtn.setAttribute("aria-expanded", false);
    dbg("dbg-source", SOURCES[currentSource].label);

    // Reload word list for new source if not cached
    if (cache[currentSource] && Object.keys(cache[currentSource]).length > 0) {
      WORDS = buildWordList(currentSource);
    } else {
      splashMsg && (splashMsg.textContent = `Switching to ${SOURCES[currentSource].label}…`);
      await loadWordList(currentSource);
    }

    // Clear search and detail
    searchEl.value = "";
    filtered = [];
    selectedIndex = -1;
    listEl.innerHTML = EMPTY_LIST_HTML;
    detailEl.innerHTML = EMPTY_DETAIL_HTML;
    detailEl.classList.remove("visible");
    setCount(`${WORDS.length.toLocaleString()} words ready · ${SOURCES[currentSource].label}`);
  });
});

// ── Word list helpers ─────────────────────────────────────────────────────
function buildWordList(sourceKey) {
  const src = SOURCES[sourceKey];
  const all = [];
  Object.values(cache[sourceKey]).forEach(chunk => {
    src.getWords(chunk).forEach(w => all.push(w.trim()));
  });
  all.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  return all;
}

async function loadWordList(sourceKey) {
  const src = SOURCES[sourceKey];
  const fetchStart = performance.now();
  const results = await Promise.allSettled(
    src.letters.map(l =>
      fetch(`${src.base}/${l}.json`).then(r => r.json())
    )
  );
  const fetchMs = Math.round(performance.now() - fetchStart);
  dbg("dbg-fetch", fetchMs + " ms", msColor(fetchMs));

  results.forEach((r, i) => {
    if (r.status === "fulfilled") {
      cache[sourceKey][src.letters[i]] = r.value;
    }
  });

  WORDS = buildWordList(sourceKey);
  dbg("dbg-words", WORDS.length.toLocaleString());
  dbg("dbg-total", Math.round(performance.now() - T0) + " ms", msColor(performance.now() - T0));
  dbg("dbg-source", src.label);
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    await loadWordList(currentSource);
    showBadge("✓ Ready");
  } catch(e) {
    setCount("Could not load word list. Check your connection.");
  }
  dismissSplash();
  setCount(WORDS.length
    ? `${WORDS.length.toLocaleString()} words ready · ${SOURCES[currentSource].label}`
    : countEl.textContent);
  searchEl.focus();
}

// ── Definition fetch ──────────────────────────────────────────────────────
async function getSenses(word, sourceKey) {
  const src = SOURCES[sourceKey];
  const letter = src.getLetter(word);

  if (!cache[sourceKey][letter]) {
    try {
      const r = await fetch(`${src.base}/${letter}.json`);
      cache[sourceKey][letter] = await r.json();
    } catch(e) { return null; }
  }

  const entry = cache[sourceKey][letter][word];
  if (!entry) return [];
  return src.getSenses(entry);
}

// ── Hyperlink words in definition ─────────────────────────────────────────
const WORD_SET = new Set(); // populated after word list loads
function linkifyDefinition(text) {
  // Split on word boundaries and wrap known words in links
  return text.replace(/\b([a-zA-Z]{3,})\b/g, (match) => {
    const lower = match.toLowerCase();
    if (WORD_SET.has(lower) && lower !== text.toLowerCase().trim()) {
      return `<a href="#" onclick="searchWord('${lower}');return false;">${match}</a>`;
    }
    return match;
  });
}
function searchWord(word) {
  searchEl.value = word;
  // Trigger search and show definition
  const q = word.toLowerCase();
  const prefix = WORDS.filter(w => w.toLowerCase().startsWith(q));
  filtered = prefix.length > 0 ? prefix : WORDS.filter(w => w.toLowerCase().includes(q));
  selectedIndex = -1;
  renderList();
  const exact = filtered.findIndex(w => w.toLowerCase() === q);
  if (exact !== -1) selectWord(exact);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function posLabel(p) {
  const map = {
    noun:"noun", verb:"verb", adjective:"adj.", adverb:"adv.",
    pronoun:"pron.", preposition:"prep.", conjunction:"conj.",
    interjection:"interj.", article:"article", abbreviation:"abbr.",
    adjective_satellite:"adj.",
  };
  return map[p] || p || "word";
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const EMPTY_DETAIL_HTML = `<div class="hint">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
  </svg>
  <span>Select a word to see its definition</span>
</div>`;

const EMPTY_LIST_HTML = `<div class="hint">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
  </svg><span>Start typing to search</span>
</div>`;

// ── Render list ───────────────────────────────────────────────────────────
function renderList() {
  const shown = filtered.slice(0, MAX);
  const frag  = document.createDocumentFragment();
  shown.forEach((word, i) => {
    const div = document.createElement("div");
    div.className = "word-item" + (i === selectedIndex ? " selected" : "");
    div.setAttribute("role", "option");
    div.setAttribute("aria-selected", i === selectedIndex);
    div.textContent = word;
    div.addEventListener("click", () => selectWord(i));
    frag.appendChild(div);
  });
  listEl.innerHTML = "";
  listEl.appendChild(frag);
  if (filtered.length === 0) {
    setCount("No matches found");
  } else if (filtered.length > MAX) {
    setCount(`Showing 50 of ${filtered.length.toLocaleString()} — keep typing`);
  } else {
    setCount(`${filtered.length} match${filtered.length === 1 ? "" : "es"}`);
  }
}

// ── Select word ───────────────────────────────────────────────────────────
async function selectWord(i) {
  selectedIndex = i;
  const word = filtered[i];

  listEl.querySelectorAll(".word-item").forEach((el, idx) => {
    el.classList.toggle("selected", idx === i);
    el.setAttribute("aria-selected", idx === i);
  });

  detailEl.innerHTML = `<button class="back-btn" onclick="closeDetail()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back
  </button>
  <div class="word-title">${escHtml(word)}</div>
  <div class="hint" style="height:auto;padding:20px 0"><div class="spinner"></div></div>`;
  detailEl.classList.add("visible");
  detailEl.scrollTop = 0;

  const defStart = performance.now();
  const senses = await getSenses(word, currentSource);
  const defMs = Math.round(performance.now() - defStart);
  dbg("dbg-def", defMs + " ms", msColor(defMs));

  let html = `<button class="back-btn" onclick="closeDetail()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back
  </button>
  <div class="word-title">${escHtml(word)}</div>
  <span class="source-tag">${SOURCES[currentSource].label}</span>`;

  if (senses === null) {
    html += `<p class="definition" style="color:var(--muted)">Could not load definition. Check your connection.</p>`;
  } else if (senses.length === 0) {
    html += `<p class="definition" style="color:var(--muted)">No definition available.</p>`;
  } else {
    senses.forEach(s => {
      html += `<div class="sense">`;
      if (s.p) html += `<span class="pos-tag">${escHtml(posLabel(s.p))}</span>`;
      html += `<div class="definition">${linkifyDefinition(escHtml(s.d))}</div>`;
      if (s.e) html += `<div class="example">"${escHtml(s.e)}"</div>`;
      html += `</div>`;
    });
  }

  detailEl.innerHTML = html;
  detailEl.scrollTop = 0;
}

function closeDetail() {
  detailEl.classList.remove("visible");
  detailEl.innerHTML = EMPTY_DETAIL_HTML;
  selectedIndex = -1;
}

// ── Search ────────────────────────────────────────────────────────────────
function onSearch() {
  const q = searchEl.value.trim().toLowerCase();
  selectedIndex = -1;

  if (!q) {
    filtered = [];
    listEl.innerHTML = EMPTY_LIST_HTML;
    setCount(`${WORDS.length.toLocaleString()} words ready · ${SOURCES[currentSource].label}`);
    detailEl.innerHTML = EMPTY_DETAIL_HTML;
    detailEl.classList.remove("visible");
    return;
  }

  const prefix = WORDS.filter(w => w.toLowerCase().startsWith(q));
  filtered = prefix.length > 0 ? prefix : WORDS.filter(w => w.toLowerCase().includes(q));
  renderList();
  // Never auto-open definition while typing
  detailEl.classList.remove("visible");
  detailEl.innerHTML = EMPTY_DETAIL_HTML;
}

searchEl.addEventListener("input", onSearch);
searchEl.addEventListener("keydown", e => {
  const items = listEl.querySelectorAll(".word-item");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    const next = Math.min(selectedIndex + 1, Math.min(filtered.length, MAX) - 1);
    selectWord(next); items[next]?.scrollIntoView({block:"nearest"});
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    const prev = Math.max(selectedIndex - 1, 0);
    selectWord(prev); items[prev]?.scrollIntoView({block:"nearest"});
  } else if (e.key === "Enter" && selectedIndex >= 0) {
    items[selectedIndex]?.click();
  }
});

// ── Swipe-from-left-edge to go back (mobile) ──────────────────────────────
const swipeEdge = document.getElementById("swipe-edge");
if (swipeEdge) {
  let touchStartX = 0;
  let touchStartY = 0;
  let tracking = false;

  swipeEdge.addEventListener("touchstart", e => {
    if (!detailEl.classList.contains("visible")) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    tracking = true;
  }, { passive: true });

  swipeEdge.addEventListener("touchmove", e => {
    if (!tracking) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    // Require a clear rightward swipe, not a vertical scroll
    if (dx > 60 && dy < 40) {
      closeDetail();
      tracking = false;
    }
  }, { passive: true });

  swipeEdge.addEventListener("touchend", () => { tracking = false; });
}

// Also allow swiping from anywhere on the detail panel itself,
// not just the narrow edge strip, for a more natural feel
let detailTouchStartX = 0;
let detailTouchStartY = 0;
let detailTracking = false;
detailEl.addEventListener("touchstart", e => {
  if (!detailEl.classList.contains("visible")) return;
  detailTouchStartX = e.touches[0].clientX;
  detailTouchStartY = e.touches[0].clientY;
  detailTracking = detailTouchStartX < 40; // only from near the left edge
}, { passive: true });
detailEl.addEventListener("touchmove", e => {
  if (!detailTracking) return;
  const dx = e.touches[0].clientX - detailTouchStartX;
  const dy = Math.abs(e.touches[0].clientY - detailTouchStartY);
  if (dx > 60 && dy < 40) {
    closeDetail();
    detailTracking = false;
  }
}, { passive: true });
detailEl.addEventListener("touchend", () => { detailTracking = false; });

// ── Boot ──────────────────────────────────────────────────────────────────
init().then(() => {
  // Populate word set for hyperlinking after words are loaded
  WORDS.forEach(w => WORD_SET.add(w.toLowerCase()));
});
</script>
</body>
</html>
